<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线预约</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    .container {
      max-width: 520px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 36px 28px;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }
    .form-group label span {
      color: #ef4444;
      margin-left: 2px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-submit:hover {
      background: #4338ca;
    }
    .btn-submit:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .success-msg {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .success-msg .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .success-msg h2 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    .success-msg p {
      color: #6b7280;
      font-size: 14px;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #9ca3af;
    }
    @media (max-width: 480px) {
      .container { padding: 24px 16px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="formSection">
      <div class="header">
        <h1>📅 在线预约</h1>
        <p>填写信息，我们会尽快与你联系确认时间</p>
      </div>
      <form id="bookingForm">
        <div class="form-group">
          <label>你的姓名 <span>*</span></label>
          <input type="text" id="name" placeholder="请输入姓名" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>手机号 <span>*</span></label>
            <input type="tel" id="phone" placeholder="请输入手机号" required>
          </div>
          <div class="form-group">
            <label>微信号</label>
            <input type="text" id="wechat" placeholder="选填">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>预约日期 <span>*</span></label>
            <input type="date" id="date" required>
          </div>
          <div class="form-group">
            <label>时段 <span>*</span></label>
            <select id="time">
              <option value="上午 (9:00-12:00)">上午 (9:00-12:00)</option>
              <option value="下午 (13:00-17:00)">下午 (13:00-17:00)</option>
              <option value="晚上 (17:00-21:00)">晚上 (17:00-21:00)</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>备注说明</label>
          <textarea id="note" placeholder="有什么需要提前说明的？比如服务类型、地址等"></textarea>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">提交预约</button>
      </form>
    </div>
    <div class="success-msg" id="successSection">
      <div class="icon">✅</div>
      <h2>预约已提交</h2>
      <p>我们会尽快与你联系确认时间<br>请保持手机畅通</p>
    </div>
  </div>
  <div class="footer">© 2025 预约服务</div>
  <script>
    document.getElementById('date').setAttribute('min', new Date().toISOString().split('T')[0]);
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '提交中...';
      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        wechat: document.getElementById('wechat').value || '',
        date: document.getElementById('date').value,
        time: document.getElementById('time').value,
        note: document.getElementById('note').value || '',
        submittedAt: new Date().toLocaleString('zh-CN')
      };
      const h = JSON.parse(localStorage.getItem('bookings') || '[]');
      h.push(data);
      localStorage.setItem('bookings', JSON.stringify(h));
      setTimeout(() => {
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('successSection').style.display = 'block';
      }, 1500);
    });
  </script>
</body>
</html>
